<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch Runtime Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>SCRATCH RUNTIME</h1>
  <p class="subtitle">DSL を engine（Scratch互換ランタイム）で実行するデモ</p>

  <!-- 内部解像度 480x360 固定。表示は CSS で拡大 -->
  <canvas id="stage" width="480" height="360"></canvas>

  <div id="controls">
    <button id="btn-flag">⚑ 緑の旗</button>
    <button id="btn-stop">■ 停止</button>
  </div>

  <div id="status">
    <span>clones: <b id="st-clones">0</b></span>
    <span>score: <b id="st-score">-</b></span>
    <span>combo: <b id="st-combo">-</b></span>
    <span>timer: <b id="st-timer">0.0</b>s</span>
  </div>

  <p id="hint">DSL: <code>spec/scratch-rhythm.dsl.json</code> — Note スプライトがクローンされ落下します（broadcast / clone / motion / variables の実行例）。</p>

  <script type="module" src="main.js"></script>
</body>
</html>
